spring:
  datasource:
    url: jdbc:h2:mem:growingpots-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: email,profile

jwt:
  secret: test-secret-key-must-be-at-least-32-characters
  expiration: 1800000

app:
  base-url: http://localhost:8080
